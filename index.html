<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDA-INT - Цифровые документы</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient-top: #153c8a;
            --bg-gradient-mid: #3b6fd4;
            --bg-gradient-bottom: #8ab4f8;
            --nav-bg: #091a3f;
            --nav-active: #2354b8;
            --text-main: #ffffff;
            --accent-red: #ff4d4d;
            --input-bg: rgba(255, 255, 255, 0.1);
            --input-border: rgba(255, 255, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

        body { background-color: #121212; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* Контейнер приложения */
        .app-container {
            width: 100%; max-width: 414px; height: 100vh; max-height: 896px;
            background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-bottom) 100%);
            position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        @media (min-width: 415px) { .app-container { height: 850px; border-radius: 40px; border: 8px solid #000; } }

        /* Экраны */
        .screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; 
            z-index: 1;
            background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-bottom) 100%);
            transition: opacity 0.5s ease, visibility 0.5s; opacity: 0; visibility: hidden; pointer-events: none;
        }
        .screen.active { opacity: 1; visibility: visible; pointer-events: auto; z-index: 10 !important; }

        #splash-screen { justify-content: center; align-items: center; }
        #splash-screen.active { z-index: 100 !important; }
        
        .logo-box { text-align: center; color: white; animation: pulse 1.5s infinite; }
        .logo-box h1 { font-size: 5rem; font-weight: 800; letter-spacing: 2px; }
        .logo-box h2 { font-size: 3rem; font-weight: 800; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }

        /* Формы */
        .auth-container { padding: 30px 25px; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; overflow-y: auto; }
        .auth-container::-webkit-scrollbar { display: none; }
        .auth-title { color: white; text-align: center; font-size: 1.8rem; margin: 20px 0; font-weight: 700; }
        .form-group { margin-bottom: 15px; width: 100%; }
        .form-group label { display: block; color: #e0ecff; font-size: 0.8rem; margin-bottom: 5px; font-weight: 600; }
        .form-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: white; font-size: 1rem; outline: none; }
        .form-input:focus { border-color: #fff; background: rgba(255,255,255,0.2); }
        select.form-input { appearance: none; background-color: #2354b8; cursor: pointer; }
        select.form-input option { background-color: #091a3f; color: white; }
        
        /* Кнопки */
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; text-align: center; transition: 0.2s; }
        .btn-primary { background: white; color: var(--bg-gradient-top); }
        .btn-secondary { background: transparent; color: white; border: 2px solid white; }
        .btn-copy { background: transparent; color: #ffe6a0; border: 2px dashed #ffe6a0; font-size: 1rem; padding: 12px; margin-bottom: 20px; }
        .btn:active { transform: scale(0.98); }

        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
        header { text-align: center; padding: 25px 20px 5px; color: var(--text-main); }
        header h1 { font-size: 2.3rem; font-weight: 800; margin-bottom: 2px; }
        
        .section-title { text-align: center; color: var(--text-main); font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; }

        .tab-content { display: none; flex-grow: 1; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }

        .documents-list-container { 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            flex-grow: 1;
            padding: 10px 24px 40px;
            -webkit-overflow-scrolling: touch;
        }
        .documents-list-container::-webkit-scrollbar { display: none; }

        /* Базовый дизайн карточки 3D */
        .document-card {
            width: 100%; 
            perspective: 1500px;
            cursor: pointer;
            margin-bottom: 35px; /* Увеличенный отступ, чтобы документы не слипались */
            flex-shrink: 0;
            
            /* Цвета по умолчанию */
            --card-text-main: #ffffff;
            --card-text-sub: rgba(255, 255, 255, 0.7);
            --card-ribbon-bg: rgba(255, 255, 255, 0.12);
            --card-ribbon-text: #ffffff;
            --card-code-bg: rgba(0, 0, 0, 0.25);
            --card-code-text: #e2e8f0;
            --card-accent: #ff4d4d;
        }

        .card-inner {
            position: relative;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            display: grid; /* Grid позволяет обеим сторонам определять высоту */
        }
        .document-card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            grid-area: 1 / 1;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden; /* Для Safari */
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        
        .card-back {
            transform: rotateY(180deg);
            align-items: center; justify-content: center;
            padding: 40px 20px; text-align: center;
        }

        .qr-container {
            background: #fff; padding: 15px; border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        .qr-container img { width: 140px; height: 140px; display: block; }
        .back-title { color: var(--card-text-sub); font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .back-number { color: var(--card-text-main); font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; }

        /* Иконка переворота */
        .flip-hint {
            position: absolute; top: 18px; left: 22px; font-size: 1.2rem;
            color: var(--card-text-main); opacity: 0.4;
        }

        /* ТЕМЫ ФЛАГОВ */
        .theme-system {
            background: linear-gradient(135deg, #101f42 0%, #070d1c 100%);
            box-shadow: 0 15px 30px rgba(5, 10, 25, 0.6); border-color: rgba(59, 111, 212, 0.3);
        }
        .theme-mimiland {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --card-text-main: #3d0c23; --card-text-sub: #752d51;
            --card-ribbon-bg: rgba(117, 45, 81, 0.15); --card-ribbon-text: #3d0c23;
            --card-code-bg: rgba(117, 45, 81, 0.1); --card-code-text: #3d0c23;
            --card-accent: #c2185b; border-color: rgba(255,255,255,0.6);
            box-shadow: 0 15px 30px rgba(244, 143, 177, 0.5);
        }
        .theme-emmaria {
            background: linear-gradient(135deg, #022c22 0%, #059669 60%, #fbbf24 100%);
            box-shadow: 0 15px 30px rgba(2, 44, 34, 0.5); --card-accent: #fcd34d;
        }
        .theme-pernikingdom {
            background: linear-gradient(135deg, #4c1d95 0%, #2e1065 60%, #d97706 100%);
            box-shadow: 0 15px 30px rgba(46, 16, 101, 0.5); --card-accent: #fef08a;
        }
        .theme-orphia {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #6d28d9 100%);
            box-shadow: 0 15px 30px rgba(15, 23, 42, 0.6); --card-accent: #a78bfa;
        }
        .theme-aliens {
            background: linear-gradient(135deg, #000000 0%, #111827 60%, #15803d 100%);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7);
            --card-text-main: #22c55e; --card-text-sub: #4ade80;
            --card-accent: #22c55e; --card-code-text: #4ade80;
        }
        .theme-varland {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 55%, #b91c1c 100%);
            box-shadow: 0 15px 30px rgba(30, 58, 138, 0.5); --card-accent: #fca5a5;
        }
        .theme-instaland {
            background: linear-gradient(135deg, #f9ce34 0%, #ee2a7b 50%, #6228d7 100%);
            box-shadow: 0 15px 30px rgba(238, 42, 123, 0.4); --card-accent: #f9ce34;
        }
        .theme-adastra {
            background: linear-gradient(135deg, #030712 0%, #1f2937 60%, #9ca3af 100%);
            box-shadow: 0 15px 30px rgba(3, 7, 18, 0.6); --card-accent: #f3f4f6;
        }

        /* Наполнение лица карточки */
        .card-top { display: flex; padding: 22px; gap: 18px; align-items: flex-start; position: relative; }
        .card-chip { position: absolute; top: 22px; right: 22px; font-size: 1.6rem; color: var(--card-text-main); opacity: 0.25; }
        
        .photo-container { 
            width: 95px; height: 125px; border-radius: 16px; overflow: hidden; 
            border: 2px solid rgba(255,255,255,0.4); background-color: #cbd5e1; 
            flex-shrink: 0; box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-container { flex-grow: 1; display: flex; flex-direction: column; padding-top: 2px; }
        .info-container h2 { font-size: 1.1rem; color: var(--card-text-main); margin-bottom: 10px; font-weight: 800; line-height: 1.2; word-break: break-word; }
        .info-container p { font-size: 0.72rem; color: var(--card-text-sub); font-weight: 600; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .info-container p span { color: var(--card-text-main); font-weight: 800; text-align: right; }
        
        .id-number { text-align: center; color: var(--card-accent); font-weight: 800; font-size: 0.95rem; padding: 10px; background: rgba(0,0,0,0.08); letter-spacing: 1px; }
        .card-ribbon { background: var(--card-ribbon-bg); color: var(--card-ribbon-text); text-align: center; font-size: 0.75rem; font-weight: 700; padding: 9px 0; letter-spacing: 1.5px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .bottom-code { background-color: var(--card-code-bg); color: var(--card-code-text); text-align: center; font-family: monospace; font-size: 0.85rem; font-weight: 700; padding: 12px 5px; word-break: break-all; letter-spacing: 2px; }

        .card-watermark { position: absolute; bottom: 40px; right: -10px; font-size: 6rem; font-weight: 900; color: var(--card-text-main); opacity: 0.04; pointer-events: none; }

        .add-doc-card {
            width: 100%; height: 90px; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; transition: 0.3s; flex-shrink: 0; gap: 6px; margin-top: 5px;
        }
        .add-doc-card:active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.6); }

        /* Вкладка ПРОФИЛЬ и НИЖНЕЕ МЕНЮ (как раньше) */
        .profile-container { padding: 0 20px 20px; color: white; overflow-y: auto; flex-grow: 1; }
        .profile-card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .profile-item { margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        .profile-item:last-child { border-bottom: none; }
        .profile-label { font-size: 0.75rem; color: #b0c0d1; }
        .profile-value { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 10px; text-align: right; }
        .profile-photo-mini { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid white; margin-bottom: 15px;}
        .bottom-nav { background-color: var(--nav-bg); display: flex; justify-content: space-around; padding: 10px 15px 20px; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8da6d1; text-decoration: none; font-size: 0.75rem; font-weight: 600; gap: 6px; width: 70px; }
        .nav-item i { font-size: 1.5rem; height: 35px; width: 35px; display: flex; justify-content: center; align-items: center; border-radius: 10px; transition: 0.3s; }
        .nav-item.active { color: #ffffff; }
        .nav-item.active i { background-color: var(--nav-active); color: #ffffff; box-shadow: 0 0 15px rgba(59, 111, 212, 0.6); }

        /* Модальные окна */
        .modal { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; pointer-events: none; transition: 0.3s ease; }
        .modal.active { opacity: 1; visibility: visible; pointer-events: auto; }
        .modal-content { background: var(--nav-bg); width: 90%; max-width: 350px; padding: 25px 20px; border-radius: 25px; color: white; transform: scale(0.9); transition: 0.3s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal.active .modal-content { transform: scale(1); }
        .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; text-align: center; }
        
        .doc-list { list-style: none; margin-bottom: 20px; }
        .doc-list li { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .doc-list li:active { background: rgba(255,255,255,0.1); }
        .doc-list li i { color: #8ab4f8; font-size: 1.2rem; width: 25px; text-align: center; }
        .doc-list li:last-child { border-bottom: none; }

        /* Прочие элементы */
        .hidden { display: none !important; }
        .photo-upload-wrapper, .custom-select-wrapper { display:none; } /* Скрыто в рамках ответа для сокращения, предполагается что этот код добавлен к предыдущему */
    </style>
</head>
<body>
    <!-- (Весь блок с авторизацией и регистрацией остается из предыдущей версии) -->
    
    <div class="app-container">
        <!-- Блок авторизации скрыт для экономии места в ответе, он остается точно таким же, как в прошлом шаге -->
        <div id="auth-wrapper" class="screen active">
            <div id="view-welcome" class="auth-container" style="justify-content: center;">
                <div class="logo-box" style="margin-bottom: 40px;"><h1>MDA</h1><h2>INT</h2></div>
                <button class="btn btn-primary" onclick="showView('view-login')">Вход</button>
            </div>
            <!-- Упрощенная форма для тестов в песочнице (В реальном проекте используй полный блок регистрации из пред. ответа) -->
            <div id="view-login" class="auth-container hidden" style="justify-content: center;">
                <h2 class="auth-title">Вход / Демо</h2>
                <button class="btn btn-primary" onclick="startDemoApp()">Запустить Демо Профиль</button>
            </div>
        </div>

        <div id="main-app" class="screen">
            <header>
                <h1>MDA</h1><p>Цифровые документы</p>
            </header>

            <div id="tab-haupt" class="tab-content active">
                <div class="section-title">Мой Кошелёк</div>
                <div class="documents-list-container" id="documents-list">
                    <!-- Документы генерируются сюда -->
                </div>
            </div>

            <!-- Вкладка Профиля (упрощенная) -->
            <div id="tab-pripl" class="tab-content">
                <div class="profile-container">
                    <button class="btn btn-secondary" onclick="logout()">Выйти</button>
                </div>
            </div>

            <div class="bottom-nav">
                <a href="#" class="nav-item active" onclick="switchTab('haupt', this)"><i class="fa-solid fa-id-card"></i>ДОКУМЕНТЫ</a>
                <a href="#" class="nav-item" onclick="switchTab('pripl', this)"><i class="fa-solid fa-user"></i>ПРОФИЛЬ</a>
            </div>
        </div>

        <!-- МОДАЛЬНЫЕ ОКНА -->
        <div id="modal-doc-menu" class="modal">
            <div class="modal-content">
                <div class="modal-title">Выберите документ</div>
                <ul class="doc-list">
                    <li onclick="openDriverModal()"><i class="fa-solid fa-car"></i> Водительские права</li>
                    <li onclick="unavailableAlert()"><i class="fa-solid fa-graduation-cap"></i> Диплом</li>
                    <li onclick="openVerifyModal()"><i class="fa-solid fa-address-card"></i> Паспорт гражданина</li>
                </ul>
                <button class="btn btn-secondary" onclick="closeModal('modal-doc-menu')">Отмена</button>
            </div>
        </div>

        <!-- Выбор категории водительских прав -->
        <div id="modal-driver-cat" class="modal">
            <div class="modal-content">
                <div class="modal-title">Категория ТС</div>
                <select id="driver-cat-select" class="form-input" style="margin-bottom: 15px;">
                    <option value="A">Категория A (Мотоциклы)</option>
                    <option value="B">Категория B (Легковые авто)</option>
                    <option value="C">Категория C (Грузовики)</option>
                    <option value="D">Категория D (Автобусы)</option>
                </select>
                <button class="btn btn-primary" onclick="generateDriverLicense()">Создать права</button>
                <button class="btn btn-secondary" onclick="closeModal('modal-driver-cat')">Отмена</button>
            </div>
        </div>

        <!-- Окно генерации паспорта -->
        <div id="modal-verify-code" class="modal">
            <div class="modal-content">
                <div class="modal-title">Генерация паспорта</div>
                <button class="btn btn-primary" onclick="generatePassport()">Подтвердить создание</button>
                <button class="btn btn-secondary" onclick="closeModal('modal-verify-code')">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // Глобальные переменные и утилиты
        let currentUser = null;
        function randNum(len) { return Array.from({length: len}, () => Math.floor(Math.random() * 10)).join(''); }
        function randLetters(len) { const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; return Array.from({length: len}, () => chars.charAt(Math.floor(Math.random() * chars.length))).join(''); }

        function showView(id) {
            document.querySelectorAll('.auth-container').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- ДЕМО ВХОД ДЛЯ ТЕСТИРОВАНИЯ ---
        function startDemoApp() {
            currentUser = {
                nameLat: "IVAN IVANOV", dob: "1995-05-15", gender: "M", login: "demo",
                photo: "https://i.pravatar.cc/150?img=11", 
                cit: { name: 'Мимиляндия', flag: 'mimiland.png', code: '1', abbr: 'ML' },
                res: { name: 'Мимиляндия', flag: 'mimiland.png' },
                hasPassport: false,
                documents: [
                    { type: 'system', title: 'SYSTEM ID - MDA', idNumber: '11234567ML890XX', theme: 'theme-system' }
                ]
            };
            document.getElementById('auth-wrapper').classList.remove('active');
            document.getElementById('main-app').classList.add('active');
            renderDocumentsList();
        }

        // Хелпер сопоставления страны с её CSS темой
        function getCountryThemeClass(countryName) {
            switch(countryName) {
                case 'Мимиляндия': return 'theme-mimiland';
                case 'Эммария': return 'theme-emmaria';
                case 'Королевство Пернии': return 'theme-pernikingdom';
                case 'Орфия': return 'theme-orphia';
                case 'Инопланетяне': return 'theme-aliens';
                case 'Варландия': return 'theme-varland';
                case 'Инсталяндия': return 'theme-instaland';
                case 'Адастра': return 'theme-adastra';
                default: return 'theme-system';
            }
        }

        // Логика переворота карточки
        function toggleFlip(element) {
            element.classList.toggle('flipped');
        }

        // Рендер кошелька документов
        function renderDocumentsList() {
            const container = document.getElementById('documents-list');
            let html = '';
            const dobFmt = currentUser.dob ? currentUser.dob.split('-').reverse().join('.') : '';
            const safeNameLat = currentUser.nameLat ? String(currentUser.nameLat) : "USER";

            currentUser.documents.forEach(doc => {
                const bottomStr = `${doc.idNumber}<${safeNameLat.replace(/\s/g, '').substring(0,6).toUpperCase()}`;
                
                // Тема карточки 
                let appliedTheme = doc.theme;
                if (doc.type === 'passport' || doc.type === 'driver_license') {
                    appliedTheme = getCountryThemeClass(currentUser.cit.name);
                }
                
                // Иконка для ленты в зависимости от типа
                let iconHtml = doc.type === 'driver_license' ? '<i class="fa-solid fa-car"></i>' : 
                              (doc.type === 'passport' ? '<i class="fa-solid fa-passport"></i>' : '<i class="fa-solid fa-fingerprint"></i>');

                // API для генерации QR кода
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${doc.idNumber}`;

                html += `
                <div class="document-card" onclick="toggleFlip(this)">
                    <div class="card-inner">
                        <!-- ЛИЦЕВАЯ СТОРОНА -->
                        <div class="card-front ${appliedTheme}">
                            <div class="flip-hint"><i class="fa-solid fa-rotate"></i></div>
                            <div class="card-chip"><i class="fa-solid fa-microchip"></i></div>
                            <div class="card-watermark">MDA</div>
                            <div class="card-top">
                                <div class="photo-container"><img src="${currentUser.photo}"></div>
                                <div class="info-container">
                                    <h2>${safeNameLat.toUpperCase()}</h2>
                                    <p>DOB: <span>${dobFmt}</span></p>
                                    <p>CIT: <span>${currentUser.cit.name}</span></p>
                                    <p>RES: <span>${currentUser.res.name}</span></p>
                                </div>
                            </div>
                            <div class="id-number">${doc.idNumber}</div>
                            <div class="card-ribbon">${iconHtml} ${doc.title}</div>
                            <div class="bottom-code">${bottomStr}</div>
                        </div>
                        
                        <!-- ОБРАТНАЯ СТОРОНА (QR-КОД) -->
                        <div class="card-back ${appliedTheme}">
                            <div class="qr-container">
                                <img src="${qrUrl}" alt="QR Code">
                            </div>
                            <div class="back-title">Scannable ID</div>
                            <div class="back-number">${doc.idNumber}</div>
                            <p style="color: var(--card-text-sub); font-size: 0.7rem; margin-top: 15px; font-weight:600;">
                                Предъявите QR-код для сканирования<br>сотруднику ведомства
                            </p>
                        </div>
                    </div>
                </div>`;
            });

            html += `
            <div class="add-doc-card" onclick="openModal('modal-doc-menu')">
                <i class="fa-solid fa-square-plus"></i>
                <p style="font-weight:700; font-size:0.85rem; letter-spacing: 0.5px;">Добавить новый документ</p>
            </div>`;

            container.innerHTML = html;
        }

        // Управление вкладками и модалками
        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            el.classList.add('active');
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function unavailableAlert() { alert("Временно недоступно."); closeModal('modal-doc-menu'); }
        function logout() { location.reload(); }

        // --- ВОДИТЕЛЬСКИЕ ПРАВА ---
        function openDriverModal() {
            const allowed = ['Мимиляндия', 'Эммария', 'Королевство Пернии', 'Орфия'];
            if (!allowed.includes(currentUser.cit.name)) {
                alert("В вашей стране пока не выдают водительские права через MDA.");
                return;
            }
            if (currentUser.documents.find(d => d.type === 'driver_license')) {
                alert("У вас уже сгенерированы водительские права!");
                return;
            }
            closeModal('modal-doc-menu');
            openModal('modal-driver-cat');
        }

        function generateDriverLicense() {
            const cit = currentUser.cit.name;
            const cat = document.getElementById('driver-cat-select').value;
            let dlId = '';

            if (cit === 'Мимиляндия') {
                // Формат: NNNKNNH (3 цифры, Буква категории, 2 цифры, Любая буква)
                dlId = `${randNum(3)}${cat}${randNum(2)}${randLetters(1)}`;
            } else {
                // Формат: AANNNNNNN (Категория, Страна (E, P, O), 7 цифр)
                const countryCode = cit === 'Эммария' ? 'E' : (cit === 'Орфия' ? 'O' : 'P');
                dlId = `${cat}${countryCode}${randNum(7)}`;
            }

            closeModal('modal-driver-cat');

            currentUser.documents.push({
                type: 'driver_license',
                title: 'ВОДИТЕЛЬСКИЕ ПРАВА (Кат. ' + cat + ')',
                idNumber: dlId,
                theme: '' 
            });
            
            renderDocumentsList();
            setTimeout(() => {
                const cont = document.getElementById('documents-list');
                cont.scrollTop = cont.scrollHeight;
            }, 100);
        }

        // --- ПАСПОРТ ГРАЖДАНИНА ---
        function openVerifyModal() {
            if (currentUser.hasPassport) { alert("Паспорт гражданина уже получен!"); return; }
            closeModal('modal-doc-menu');
            openModal('modal-verify-code');
        }

        function generatePassport() {
            closeModal('modal-verify-code');
            const passId = `${randNum(9)}U01${randNum(1)}`;
            currentUser.documents.push({ type: 'passport', title: 'ПАСПОРТ ГРАЖДАНИНА', idNumber: passId, theme: '' });
            currentUser.hasPassport = true;
            renderDocumentsList();
            setTimeout(() => { const cont = document.getElementById('documents-list'); cont.scrollTop = cont.scrollHeight; }, 100);
        }
    </script>
</body>
</html>
